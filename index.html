<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meinopoly — Dominion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       MEINOPOLY — Game Boy Color / 16-bit pixel UI
       ============================================================ */

    /* ---- TOKENS / PALETTES ---- */
    :root,
    [data-theme="council"] {
      --bg:#0e1120; --bg2:#1b2034; --bg3:#0a0c17;
      --ink:#f2e9cf; --ink-dim:#9298b6; --accent:#e9b23c; --accent2:#6f7cd6;
      --line:#39406a; --good:#5ad98a; --bad:#e2574f;
    }
    [data-theme="verdant"] {
      --bg:#0c2410; --bg2:#16401c; --bg3:#081a0b;
      --ink:#c4e86a; --ink-dim:#6f9a3f; --accent:#a9d637; --accent2:#5fae54;
      --line:#2f5e2c; --good:#bdee5a; --bad:#e0b24a;
    }
    [data-theme="arcade"] {
      --bg:#0a0a16; --bg2:#16162e; --bg3:#06060f;
      --ink:#eaeaff; --ink-dim:#8a8ac0; --accent:#ff4d8d; --accent2:#36d6e7;
      --line:#34346a; --good:#48e89a; --bad:#ff5470;
    }
    :root {
      --disp:'Press Start 2P', monospace;
      --body:'VT323', monospace;
      --ui-scale:1;
      --bevel: inset 2px 2px 0 rgba(255,255,255,.10), inset -2px -2px 0 rgba(0,0,0,.5);
      --drop: 5px 5px 0 rgba(0,0,0,.45);
    }

    /* ---- RESET ---- */
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      background:var(--bg); color:var(--ink); font-family:var(--body);
      -webkit-font-smoothing:none; font-smooth:never; image-rendering:pixelated;
      overflow:hidden;
    }
    img { image-rendering:pixelated; }
    button { font-family:inherit; color:inherit; cursor:pointer; border:none; background:none; }
    input, select, textarea { font-family:var(--body); }
    ::-webkit-scrollbar { width:10px; height:10px; }
    ::-webkit-scrollbar-track { background:var(--bg3); }
    ::-webkit-scrollbar-thumb { background:var(--line); border:2px solid var(--bg3); }

    /* ---- APP FRAME + CRT ---- */
    #app { position:fixed; inset:0; }
    .app {
      position:fixed; inset:0; overflow:auto;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 2px, transparent 2px 4px),
        radial-gradient(120% 120% at 50% 0%, var(--bg2) 0%, var(--bg) 60%);
    }
    .app__frame {
      min-height:100%; display:flex; align-items:stretch; justify-content:center;
      transform:scale(var(--ui-scale)); transform-origin:top center;
    }
    .app--scan::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
      background:repeating-linear-gradient(0deg, rgba(0,0,0,.30) 0 1px, transparent 1px 3px);
      mix-blend-mode:multiply; opacity:.55;
    }
    .app--crt::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:8999;
      background:radial-gradient(130% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
    }

    /* ---- GLOBAL PIXEL FORM CONTROLS ---- */
    input[type="text"], input[type="password"], input[type="number"], select {
      background:var(--bg3); color:var(--ink); border:3px solid var(--line);
      box-shadow:var(--bevel); padding:9px 10px; font-family:var(--body); font-size:18px;
      outline:none;
    }
    input::placeholder { color:var(--ink-dim); }
    input:focus, select:focus { border-color:var(--accent); }
    select { font-family:var(--disp); font-size:9px; padding:8px; }

    /* ============ PIXEL PRIMITIVES ============ */
    .pix-panel { position:relative; background:var(--bg2); border:3px solid var(--line);
      box-shadow:var(--bevel), var(--drop); }
    .pix-panel--inset { background:var(--bg3); box-shadow:inset 2px 2px 0 rgba(0,0,0,.55), inset -2px -2px 0 rgba(255,255,255,.05); }
    .pix-panel__accent { position:absolute; left:0; top:0; bottom:0; width:6px; }
    .pix-panel__titlebar { display:flex; justify-content:space-between; align-items:center;
      background:var(--bg3); border-bottom:3px solid var(--line); padding:7px 10px; }
    .pix-panel__title { font-family:var(--disp); font-size:9px; letter-spacing:1px; color:var(--accent); }
    .pix-panel__right { font-family:var(--disp); font-size:8px; color:var(--ink-dim); }
    .pix-panel__body { padding:12px; }

    .pix-btn { font-family:var(--disp); text-transform:uppercase; letter-spacing:1px;
      color:var(--ink); background:var(--bg3); border:3px solid var(--line);
      box-shadow:var(--bevel), 4px 4px 0 rgba(0,0,0,.5); padding:11px 14px; font-size:10px;
      transition:transform .04s, filter .1s; line-height:1.4; }
    .pix-btn:hover:not(:disabled) { filter:brightness(1.18); }
    .pix-btn:active:not(:disabled) { transform:translate(3px,3px); box-shadow:var(--bevel), 1px 1px 0 rgba(0,0,0,.5); }
    .pix-btn:disabled { opacity:.4; cursor:not-allowed; }
    .pix-btn--primary { background:var(--accent); color:#161009; border-color:#000; }
    .pix-btn--default { background:var(--bg2); }
    .pix-btn--success { background:var(--good); color:#0a1a10; border-color:#000; }
    .pix-btn--danger { background:var(--bad); color:#1a0707; border-color:#000; }
    .pix-btn--ghost { background:transparent; color:var(--ink-dim); }
    .pix-btn--full { width:100%; }
    .pix-btn--sm { font-size:8px; padding:8px 10px; box-shadow:var(--bevel), 3px 3px 0 rgba(0,0,0,.5); }
    .pix-btn--lg { font-size:13px; padding:15px 22px; }

    /* stat bars */
    .statrow { display:flex; align-items:center; gap:7px; margin:3px 0; }
    .statrow__label { font-family:var(--disp); font-size:7px; color:var(--ink-dim); width:26px; }
    .statrow__cells { display:flex; gap:2px; flex:1; }
    .statcell { flex:1; height:9px; background:var(--bg3); box-shadow:inset 1px 1px 0 rgba(0,0,0,.6); }
    .statcell.on { box-shadow:inset 1px 1px 0 rgba(255,255,255,.4); }
    .statrow__val { font-family:var(--disp); font-size:9px; color:var(--ink); width:14px; text-align:right; }

    /* portrait */
    .portrait { position:relative; background:var(--bg3); border:3px solid var(--pcol,var(--accent));
      box-shadow:var(--bevel), 3px 3px 0 rgba(0,0,0,.5); flex:0 0 auto; overflow:hidden; }
    .portrait img { width:100%; height:100%; object-fit:cover; display:block; }
    .portrait--sel { box-shadow:0 0 0 2px var(--pcol), var(--bevel), 0 0 14px var(--pcol); }
    .portrait__empty { width:100%; height:100%; display:grid; place-items:center; font-family:var(--disp);
      font-size:18px; color:var(--ink-dim); }

    /* dice */
    .die { display:grid; grid-template-columns:repeat(3,1fr); width:44px; height:44px; gap:2px; padding:5px;
      background:#f3efe0; border:3px solid #0b0b12; box-shadow:var(--bevel), 3px 3px 0 rgba(0,0,0,.5); }
    .die__cell { display:grid; place-items:center; }
    .pip { width:8px; height:8px; background:#1a1622; box-shadow:inset 1px 1px 0 rgba(255,255,255,.25); }
    .die--rolling { animation:dieShake .25s steps(2) infinite; }
    @keyframes dieShake { 0%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-1px,1px) rotate(-4deg)}
      50%{transform:translate(1px,-1px) rotate(3deg)} 75%{transform:translate(1px,1px) rotate(-2deg)} }

    /* token */
    .token { display:inline-grid; place-items:center; width:20px; height:20px; background:var(--tcol);
      border:2px solid #000; color:#0a0a12; font-family:var(--disp); font-size:8px;
      box-shadow:inset 1px 1px 0 rgba(255,255,255,.5), inset -1px -1px 0 rgba(0,0,0,.4); }
    .token--sm { width:15px; height:15px; font-size:6px; }

    /* experience wave: token hop tween + centered dice-tumble overlay. The overlay reuses
       the existing .die/.die__cell/.pip pip-die markup (dieHtml()) at 2x size — no new
       glyph language. */
    /* 0.12s tween must finish inside anim.js's HOP_MS=160ms per-tile cadence, or a fast
       double-hop would visibly interrupt the CSS transition mid-slide. */
    .token--hop { transition: left 0.12s ease, top 0.12s ease; }
    #dice-overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
      gap:28px; pointer-events:none; z-index:40; }
    #dice-overlay .bigdie .die { width:88px; height:88px; gap:4px; padding:10px; }
    #dice-overlay .bigdie .pip { width:16px; height:16px; }

    /* money */
    .money { font-family:var(--disp); color:var(--good); font-size:1em; letter-spacing:.5px; }
    .money--hidden { color:var(--ink-dim); }

    /* glyphs (no emoji) */
    .glyph { display:inline-grid; place-items:center; font-family:var(--body); line-height:1; color:var(--gcol,var(--ink-dim)); }
    .glyph::before { font-size:1.25em; }
    .glyph--arrow::before { content:'\25B6'; }
    .glyph--arrow-back::before { content:'\25C0'; }
    .glyph--q::before { content:'?'; font-family:var(--disp); font-size:.85em; }
    .glyph--chest::before { content:'\25A3'; }
    .glyph--coin::before { content:'$'; font-family:var(--disp); font-size:.8em; }
    .glyph--rail::before { content:'\25AC'; }
    .glyph--bolt::before { content:'\21AF'; }
    .glyph--bars::before { content:'\2016'; }
    .glyph--cuff::before { content:'\00BB'; }
    .glyph--park::before { content:'P'; font-family:var(--disp); font-size:.8em; }
    .glyph--crown::before { content:'\2654'; }
    .glyph--swap::before { content:'\21C4'; }

    /* ============ TOP CONTROL BAR ============ */
    .topbar { position:fixed; top:0; right:0; z-index:9200; display:flex; gap:6px; align-items:center;
      padding:8px 10px; }
    .topbar__theme { display:flex; align-items:center; gap:4px; }
    .topbar__label { font-family:var(--disp); font-size:7px; color:var(--ink-dim); }
    .topbar .pix-btn { padding:7px 9px; font-size:7px; box-shadow:var(--bevel), 2px 2px 0 rgba(0,0,0,.5); }
    .topbar select { padding:6px; font-size:7px; }
    /* Fullscreen-stage wave (Task 2): auto-hide topbar, in-game only. #topbar-hotzone
       is a thin fixed strip at the very top edge — invisible, pointer-events:auto —
       that a document-level `mousemove` listener (App.js createLayout) polls against
       (along with the topbar's own live rect) to toggle .topbar--show; see that
       listener's comment for why a plain mouseenter/mouseleave pair gets stuck open
       in practice. :focus-within keeps it revealed while tabbed into (no JS needed
       for that path). Menu/select/lobby/results never gain .app--game, so the
       topbar there is unaffected — always visible, exactly as it is today. */
    #topbar-hotzone { display:none; }
    .app--game #topbar-hotzone { display:block; position:fixed; top:0; left:0; right:0;
      height:10px; z-index:59; }
    .app--game .topbar { transform:translateY(-100%); transition:transform .15s ease; }
    .app--game .topbar.topbar--show, .app--game .topbar:focus-within { transform:translateY(0); }

    .screen { width:100%; padding:26px; }

    /* ============ TITLE / MENU SCREENS ============ */
    .screen--menu { display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:22px; min-height:100vh; text-align:center; }
    .title__art { text-align:center; }
    .title__logo-line { font-family:var(--disp); font-size:64px; color:var(--accent); letter-spacing:4px;
      text-shadow:6px 6px 0 #000, 0 0 24px color-mix(in srgb, var(--accent) 60%, transparent); }
    .title__tag { font-family:var(--disp); font-size:11px; color:var(--ink-dim); letter-spacing:3px; margin-top:18px; }
    .title__sub { font-family:var(--body); font-size:20px; color:var(--ink-dim); margin-top:6px; }
    .title__press { font-family:var(--disp); font-size:10px; color:var(--accent); animation:blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity:.15; } }
    .title__foot { font-family:var(--disp); font-size:8px; color:var(--ink-dim); letter-spacing:2px; }

    /* hero start screen (key art) */
    .screen--hero { position:relative; min-height:100vh; padding:0; background:#07060f; overflow:hidden; }
    .hero-art { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center top;
      image-rendering:pixelated; }
    .hero-overlay { position:absolute; left:0; right:0; bottom:0; z-index:2; display:flex; flex-direction:column;
      align-items:center; gap:14px; padding:80px 24px 38px;
      background:linear-gradient(to top, rgba(7,6,15,.96) 0%, rgba(7,6,15,.8) 40%, transparent 100%); }

    .menu__heading { font-family:var(--disp); font-size:22px; color:var(--accent); text-shadow:3px 3px 0 #000; }
    .menu__sub { font-family:var(--body); font-size:18px; color:var(--ink-dim); margin-top:8px; }

    /* entry progress breadcrumb */
    .breadcrumb { display:flex; flex-wrap:wrap; gap:6px; align-items:center; justify-content:center;
      font-family:var(--disp); font-size:8px; color:var(--ink-dim); margin-bottom:6px; }
    .breadcrumb__step { display:inline-flex; gap:5px; align-items:baseline; padding:3px 6px; }
    .breadcrumb__step--current { color:var(--accent); }
    .breadcrumb__step--clickable { cursor:pointer; color:var(--ink); }
    .breadcrumb__step--clickable:hover { filter:brightness(1.3); }
    .breadcrumb__step--future { opacity:.45; }
    .breadcrumb__val { font-family:var(--body); font-size:12px; color:var(--ink-dim); }
    .breadcrumb__sep { color:var(--ink-dim); opacity:.5; }

    /* mode select: two big buttons */
    .mode-grid { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
    .mode-btn { min-width:240px; }

    /* player count grid */
    .count-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:640px; }
    .count-btn { min-width:120px; }
    .setup__count { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .setup__count .count-grid { max-width:560px; }
    .setup__count .count-btn { min-width:44px; }

    /* victory selector */
    .vic-grid { display:grid; grid-template-columns:repeat(3, minmax(0,260px)); gap:14px;
      justify-content:center; width:100%; max-width:820px; }
    @media (max-width:700px) { .vic-grid { grid-template-columns:1fr; max-width:300px; } }
    .vic-card { text-align:left; }
    .vic-card--sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), var(--bevel), 0 0 16px color-mix(in srgb,var(--accent) 50%, transparent); }
    .vic-paramrow { min-height:36px; display:flex; justify-content:center; }
    .vic-param { display:flex; align-items:center; gap:12px; background:var(--bg2); border:3px solid var(--line);
      box-shadow:var(--bevel); padding:10px 16px; }
    .vic-actions { display:flex; gap:14px; align-items:center; }

    /* map grid */
    .map-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,280px)); gap:14px;
      justify-content:center; max-width:900px; width:100%; }
    .map-card { cursor:pointer; display:flex; flex-direction:column; text-align:left; max-width:280px; }
    .map-card:hover { filter:brightness(1.12); transform:translateY(-2px); }
    /* live SVG map preview inside mod/map/setup cards */
    .minimap { width:100%; height:96px; display:block; margin-bottom:8px;
      background:rgba(0,0,0,.25); image-rendering:auto; }
    .mod-card .minimap, .vic-card .minimap { height:80px; }
    .map-card .pix-panel__body { display:flex; flex-direction:column; gap:8px; }
    .map-card__title { font-family:var(--disp); font-size:11px; color:var(--accent); letter-spacing:1px; line-height:1.4; }
    .map-card__desc { font-family:var(--body); font-size:16px; color:var(--ink-dim); line-height:1.2; min-height:54px; }
    .map-card__meta { display:flex; gap:6px; flex-wrap:wrap; }
    .map-tag { font-family:var(--disp); font-size:7px; color:var(--ink-dim); background:var(--bg3);
      border:2px solid var(--line); padding:4px 7px; }

    /* ============ ONLINE LOBBY ============ */
    .lobby2 { width:100%; max-width:640px; display:flex; flex-direction:column; gap:14px; }
    .lobby2__nameinput { display:flex; gap:8px; align-items:center; }
    .lobby2__nameinput input { flex:1; }
    .lobby2__createrow { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .lobby2__matchrow { display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:9px; border-bottom:2px dashed var(--line); }
    .lobby2__matchrow:last-child { border-bottom:none; }
    .lobby2__matchid { font-family:var(--disp); font-size:8px; color:var(--ink); }
    .lobby2__matchmeta { font-family:var(--body); font-size:15px; color:var(--ink-dim); margin-top:3px; }
    .lobby2__seats { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
    .lobby2__seat { font-family:var(--disp); font-size:6px; padding:3px 5px; border:2px solid var(--line); }
    .lobby2__seat.joined { color:var(--good); border-color:var(--good); }
    .lobby2__seat.open { color:var(--accent2); }
    .lobby2__empty { font-family:var(--body); font-size:17px; color:var(--ink-dim); text-align:center; padding:18px 0; }

    /* ============ CHARACTER SELECT ============ */
    .screen--select { display:flex; flex-direction:column; min-height:100vh; }
    .select__head { text-align:center; margin-bottom:18px; }
    .select__heading { display:flex; gap:14px; align-items:baseline; justify-content:center; flex-wrap:wrap; }
    .select__p { font-family:var(--disp); font-size:14px; color:var(--accent2); }
    .select__h { font-family:var(--disp); font-size:22px; color:var(--accent); text-shadow:3px 3px 0 #000; }
    .select__sub { font-family:var(--body); font-size:18px; color:var(--ink-dim); margin-top:8px; }
    .select__grid { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; align-items:stretch; }
    .charcard { background:var(--bg2); border:3px solid var(--line); box-shadow:var(--bevel), var(--drop);
      padding:11px; display:flex; flex-direction:column; gap:8px; cursor:pointer; transition:transform .06s, filter .1s; }
    .charcard:hover { filter:brightness(1.12); transform:translateY(-2px); }
    .charcard--sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), var(--bevel), 0 0 16px color-mix(in srgb,var(--accent) 50%, transparent); }
    .charcard--taken { opacity:.35; filter:grayscale(.7); cursor:not-allowed; }
    .charcard__top { display:flex; gap:10px; }
    .charcard__id { display:flex; flex-direction:column; gap:3px; min-width:0; }
    .charcard__name { font-family:var(--disp); font-size:10px; line-height:1.3; }
    .charcard__title { font-family:var(--body); font-size:16px; color:var(--ink-dim); }
    .charcard__money { font-family:var(--disp); font-size:7px; color:var(--ink-dim); margin-top:auto; }
    .charcard__stats { background:var(--bg3); padding:7px; border:2px solid var(--line); }
    .charcard__passive { display:flex; flex-direction:column; gap:3px; flex:1; }
    .charcard__passive-name { font-family:var(--disp); font-size:8px; color:var(--accent); }
    .charcard__passive-desc { font-family:var(--body); font-size:15px; line-height:1.15; color:var(--ink); }
    .charcard__foot { display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
    .charcard__lore, .charcard__ai { font-family:var(--disp); font-size:7px; color:var(--accent2);
      border:2px solid var(--line); padding:5px 7px; background:var(--bg3); }
    .charcard__lore:hover, .charcard__ai:hover { filter:brightness(1.3); }
    .charcard__takentag { font-family:var(--disp); font-size:7px; color:var(--bad); }
    .charcard__seltag { font-family:var(--disp); font-size:7px; color:var(--accent); }
    .charcard__intro { font-family:var(--body); font-size:14px; color:var(--accent2); font-style:italic;
      line-height:1.2; background:var(--bg3); border:2px solid var(--line); padding:6px; }
    .select__bar { display:flex; align-items:center; gap:16px; margin-top:16px; padding:12px 16px;
      background:var(--bg2); border:3px solid var(--line); box-shadow:var(--bevel); position:sticky; bottom:0; flex-wrap:wrap; }
    .select__chosen { flex:1; display:flex; align-items:center; gap:12px; font-family:var(--disp); font-size:11px; }
    .select__chosen-title { font-family:var(--body); font-size:17px; color:var(--ink-dim); }
    .select__chosen-empty { font-family:var(--body); font-size:18px; color:var(--ink-dim); }

    /* ============ GAME ============ */
    /* Rows layout: top chip strip / map-dominant center / bottom action bar.
       --chrome-h measured in a real 1400x900 browser (topbar 50px fixed overlay
       + .screen padding 26px top/bottom + .game__chips row + .game__actionbar
       row + gaps) — see task-2-report.md for the measured breakdown. */
    .screen--game { display:grid; grid-template-rows:auto minmax(0,1fr) auto; gap:10px;
      height:calc(100dvh - 74px); padding:20px; }
    .game__chips { display:flex; gap:8px; overflow-x:auto; align-items:stretch; }
    /* #player-info is a plain <div> wrapper App.js writes renderPlayerInfo's
       chips into (see App.js#playerInfoEl); as a normal block it made every
       .pcard--chip a block-level child of THAT div, stacking them VERTICALLY
       inside .game__chips's flex row instead of becoming flex items of the
       row themselves — invisible at 2 players (96px tall strip) but at 10
       players a 480px-tall column crushed the board to ~210px square (whole-
       branch review, reproduced in a real headless Chromium run against this
       stylesheet). display:contents removes the wrapper's own box so its
       children (the chips) become direct flex items of .game__chips, while
       the element stays in the DOM/event tree — the delegated click listener
       App.js attaches to #player-info (createLayout ~418, chip -> popover)
       keeps working because click bubbling follows the DOM tree, not the box
       tree. Verified empirically post-fix at 1400x900: 2p and 6p chips share
       one offsetTop (single row); see task report for the measurement table. */
    #player-info { display:contents; }
    .pcard { background:var(--bg2); border:3px solid var(--line); box-shadow:var(--bevel), var(--drop); padding:11px;
      display:flex; flex-direction:column; gap:8px; }
    .pcard--active { border-color:var(--pc); box-shadow:0 0 0 2px var(--pc), var(--bevel), 0 0 16px color-mix(in srgb,var(--pc) 45%, transparent); }
    .pcard--bankrupt { opacity:.45; filter:grayscale(.6); }
    .pcard--chip { display:flex; flex-direction:row; align-items:center; gap:7px; padding:5px 9px; min-width:0; cursor:pointer; flex:none; }
    .pcard--chip .pcard__name { font-size:8px; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pcard--chip .pcard__money { font-size:13px; }
    .pcard__head { display:flex; gap:9px; align-items:center; }
    .pcard__id { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
    .pcard__name { font-family:var(--disp); font-size:9px; }
    .pcard__title { font-family:var(--body); font-size:15px; color:var(--ink-dim); }
    .pcard__turn { font-family:var(--disp); font-size:7px; color:var(--bg); background:var(--pc); padding:3px 5px; }
    .pcard__bankrupt { font-family:var(--disp); font-size:7px; color:var(--bad); }
    .pcard__money { font-family:var(--disp); font-size:18px; }
    .pcard__money .money { font-size:18px; }
    .pcard__meta { display:flex; justify-content:space-between; align-items:center; font-family:var(--disp); font-size:7px; color:var(--ink-dim); gap:6px; }
    .pcard__meta span { display:flex; align-items:center; gap:5px; }
    .pcard__passive { color:var(--accent2); }
    .pcard__jail { font-family:var(--disp); font-size:7px; color:var(--bad); }
    .pcard__abilities { font-family:var(--disp); font-size:7px; color:var(--accent2); line-height:1.5; }
    .pcard__props { display:flex; flex-wrap:wrap; gap:3px; }
    .propchip { font-family:var(--body); font-size:13px; color:var(--ink); background:var(--bg3);
      border:2px solid var(--line); border-left-width:5px; padding:1px 5px; }
    .propchip--mortgaged { opacity:.5; text-decoration:line-through; }
    .chip__face { width:32px; height:32px; image-rendering:pixelated; object-fit:cover; border:2px solid var(--pc); flex:none; }
    .chip__face--letter { display:flex; align-items:center; justify-content:center; font-family:var(--disp); background:var(--bg3); color:var(--tcol,var(--ink)); }
    .chip__deeds { font-family:var(--disp); font-size:7px; color:var(--ink-dim); }

    /* board */
    /* Container-query sizing (final fix). The two prior height-driven /
       max-aspect-ratio-media-query branches each fixed one axis and broke
       the other: height-driven overflowed near-square windows (895x900 ->
       board 855px, top at y=-29, UNDER the topbar, overlapping the chip
       strip/action bar by ~100px each); the width-driven media-query branch
       only kicked in past 1:1, so it never covered 0.75-1.0 near-square
       ratios (e.g. a half-snapped 1080p/1440p desktop window). Making
       .game__center a size container and sizing .board off 100cqmin (the
       smaller of the container's own computed width/height) subsumes both
       branches in one rule — no aspect-ratio-conditional media query needed.
       Requires Chrome 105+/Safari 16+; the stylesheet already requires
       Chrome 111+ for color-mix, so this is not a new support regression. */
    .game__center { display:flex; justify-content:center; align-items:center; position:relative; min-height:0; container-type:size; }
    .board { width:min(100cqmin, 1100px); aspect-ratio:1/1; position:relative; }
    .game__actionbar { display:flex; justify-content:center; align-items:center; gap:12px; overflow-y:auto; min-height:0; }

    /* drawer tab rail — vertical strip anchored to .game__center's right edge */
    #drawer-tabs { position:absolute; right:0; top:50%; transform:translateY(-50%);
      display:flex; flex-direction:column; gap:6px; z-index:30; }
    .drawer-tabs__btn { font-family:var(--disp); text-transform:uppercase; letter-spacing:1px;
      color:var(--ink); background:var(--bg3); border:3px solid var(--line);
      box-shadow:var(--bevel), 3px 3px 0 rgba(0,0,0,.5); writing-mode:vertical-rl; padding:8px 4px; font-size:7px; }
    .drawer-tabs__btn:hover { filter:brightness(1.18); }
    .drawer-tabs__btn--active { background:var(--accent); color:#161009; border-color:#000; }
    /* q2: unread dot on the LOG tab — square (not round) to fit the GB pixel
       aesthetic; positioned via the button's own writing-mode:vertical-rl flow
       rather than absolute placement so it doesn't need the button's box
       measured. Toggled via [hidden] on .drawer-tabs__dot (see App.js
       _updateLogUnread) + .drawer-tabs__btn--unread for the outline accent. */
    .drawer-tabs__btn--unread { border-color:var(--accent2); }
    .drawer-tabs__dot { display:inline-block; width:6px; height:6px; margin-top:6px;
      background:var(--accent2); border:1px solid #000; }
    .drawer-tabs__dot[hidden] { display:none; }

    /* right drawer — log / chat / manage. Section containers (#log/#ai-responses/
       #chat-panel/#manage) live inside permanently (see App.js createLayout);
       [hidden] only visually hides it — render functions keep writing into them. */
    .drawer { position:fixed; right:0; top:74px; bottom:0; width:min(340px, 90vw);
      background:var(--bg2); border-left:3px solid var(--line); z-index:35;
      display:flex; flex-direction:column; gap:10px; padding:10px; overflow-y:auto; }
    .drawer[hidden] { display:none; }
    .drawer__foot { margin-top:auto; }
    @media (max-width:700px) {
      .drawer { top:auto; height:60dvh; width:100vw; border-left:none; border-top:3px solid var(--line); }
    }

    /* ============ FULL-BLEED GAME STAGE (Task 2) ============
       .app--game is toggled on #app-root by _showScreen('game') (App.js) — set ONLY
       for the 'game' screen, so menu/lobby/select/results are unaffected (no class,
       no rule below applies). #game-area becomes the whole viewport, its own
       stacking context. The chip strip and action bar go position:fixed, which per
       the CSS Grid spec (out-of-flow boxes are not grid items) removes them from
       grid-item consideration entirely — the single remaining in-flow item
       (.game__center) would otherwise get auto-placed into the base template's
       first "auto" (content-sized) row and be starved of height, so it's pinned to
       a lone 1fr row instead. Board sizing: the design doc's REPLACE branch is
       taken (see the .game__center/.board pair below) — the cqmin container-query
       mechanism is dropped under .app--game and the board sized off the viewport
       directly. The 1100px cap stays (keeps tile text from ballooning on very
       wide/tall monitors); it only bites above a 1100px viewport-min, i.e. never
       at the 1400x900 dev target (900px board).
       width/height are set EXPLICITLY (not left to the inset:0 shorthand alone):
       #game-area also carries the base .screen (width:100%) and .screen--game
       (height:calc(100dvh - 74px), the OLD topbar-reservation figure) rules, which
       set those two properties on their own cascade track — inset:0 only fills in
       top/left/right/bottom, and per the CSS2.1 over-constrained-position rule,
       an explicit height/width elsewhere WINS over what inset:0 would otherwise
       imply (top+bottom get silently reconciled around it instead). Verified by
       measurement: without this line #board rendered 826px (900 - 74), not ~900 —
       the stale 74px topbar reservation leaking straight through. */
    .app--game #game-area { position:fixed; inset:0; z-index:10; padding:0; gap:0;
      width:100dvw; height:100dvh; grid-template-rows:1fr; }
    /* Board sizing under .app--game: container-query OFF, viewport units ON (the
       design doc's sanctioned REPLACE branch). NOT merely cosmetic simplification:
       `container-type:size` implies layout containment, and layout containment makes
       .game__center a STACKING CONTEXT — which traps #dice-overlay's z:50 and
       #drawer-tabs' z inside it, where they can never paint above the chip strip /
       action bar (z:45 SIBLINGS of .game__center in #game-area's context; a stacking
       context participates as one atomic unit at its own z level, auto→0 here). The
       Terra Circuit E2E interception failure (see .game--routepick below) is what
       surfaced the chrome/board overlap for real. With container-type:normal,
       .game__center (position:relative, z-auto) is NOT a stacking context, so dice
       z:50 / tabs z:46 genuinely stack above the z:45 chrome. The base cqmin rule
       (declared above) stays for the non-fullbleed fallback layout. Board measured
       900x900 at 1400x900 after this change — identical to the cqmin figure. */
    /* Chrome-band reservation (Task 2 review fix). Measured live at 1400x900:
       the square-board rule above (min(100dvw,100dvh,1100px)) equals exactly
       100dvh on any landscape viewport (height<=width), leaving ZERO vertical
       letterbox — the fixed chip strip (top:8, real height 64px at rest) and
       action bar (bottom:8, real height 84-152px depending on turnbox state —
       see below) sat ON TOP of the board's top/bottom tile rows the whole
       time (measured: board 0-900, chips 8-72, actionbar 796-892 at rest).
       Fix: size the board off the viewport MINUS two reserved bands, one per
       bar, instead of the raw viewport. --chrome-top/--chrome-bottom hold the
       reserved px; the CSS fallback defaults are only ever what a broken/
       pre-JS paint would use — in practice overwritten before first paint
       (see _syncChromeBands doc comment in App.js: it runs in the same
       update() tick that first shows the game screen, so there's no flash of
       the old sizing).
       --chrome-top default 76px = measured chip-strip content height (64px,
       stable across every game state — chips only vary by player COUNT, not
       turn context) + 8px fixed top-offset + 4px gap buffer.
       --chrome-bottom default 108px = measured action-bar content height at
       REST (96px, before the first roll of a turn: who-chip + ROLL DICE +
       disabled END TURN) + 8px fixed bottom-offset + 4px gap buffer. This is
       a FALLBACK ONLY, not the worst case: injecting the real jail-state
       turnbox markup (ROLL FOR DOUBLES + PAY FINE + disabled END TURN, a
       state every game can reach via triple-doubles or a Go-To-Jail tile)
       measured 152px tall — 58% taller than the CSS-only rest default. A
       STATIC var pinned to the jail case would permanently reserve that much
       band even during the ~95% of turns when the bar is 84-96px, shrinking
       the board from the fullscreen ~900px to ~658px (barely +2.5% over the
       pre-Task-2 642px baseline) for a state that's only on screen briefly.
       _syncChromeBands() (App.js, called every update() after renderTurnbox)
       measures the REAL current heights of both bars and writes them into
       these two custom properties on #game-area, so the board stays as large
       as the chrome ACTUALLY on screen allows right now, and only shrinks
       while a genuinely taller state (e.g. jail) is really rendered — see
       that method's doc comment for the full reasoning and the CSS-var-only
       vs JS-sync tradeoff. */
    .app--game .game__center { container-type:normal;
      padding-top:var(--chrome-top, 76px); padding-bottom:var(--chrome-bottom, 108px); }
    .app--game .board { width:min(100dvw, calc(100dvh - var(--chrome-top, 76px) - var(--chrome-bottom, 108px)), 1100px); }
    /* Route-pick modality (regression fix — gameplay.spec "Terra Circuit renders and
       is playable" caught it): the floating chrome overlays the full-bleed board, so
       a route-target tile under the action bar (bottom row) or a .gcity route label
       under the chip strip was UNCLICKABLE (Playwright actionability: ".game__actionbar
       intercepts pointer events"). While a fork is awaiting a pick, #game-area gains
       .game--routepick (App.js _syncRoutePickChrome): both bars go click-transparent
       and dim — picking a route is the only meaningful input at that moment, and the
       turnbox's "CHOOSE YOUR ROUTE" hint stays readable through the dim. */
    .app--game #game-area.game--routepick .game__chips,
    .app--game #game-area.game--routepick .game__actionbar { pointer-events:none; opacity:.45; }
    /* Owner acceptance fix wave, Fix 1 ("卡住了" — the game was WAITING for a
       route click the owner couldn't see): a floating banner INSIDE
       .game__center, shown ONLY under .game--routepick, so it can never be
       dimmed by the routepick opacity drop above (that rule only ever
       targets .game__chips/.game__actionbar). Purely CSS-gated — no JS
       visibility toggle needed beyond the existing _syncRoutePickChrome
       class flip. Lives in .game__center so it's renderer-agnostic (flat
       atlas AND globe both render into the same .game__center; see the
       .gcity--route rule below for the globe-side twin of this pulse). */
    #route-banner { display:none; position:absolute; top:14px; left:50%; transform:translateX(-50%);
      z-index:20; pointer-events:none; font-family:var(--disp); font-size:11px; letter-spacing:1px;
      color:#161009; background:var(--good); border:3px solid #000; box-shadow:var(--bevel), 4px 4px 0 rgba(0,0,0,.5);
      padding:10px 16px; text-align:center; white-space:nowrap; animation:routeBannerPulse 1s ease-in-out infinite; }
    @keyframes routeBannerPulse { 0%,100% { filter:brightness(1); } 50% { filter:brightness(1.25); } }
    @media (max-width:680px) { #route-banner { white-space:normal; max-width:88vw; font-size:9px; top:8px; } }
    .app--game #game-area.game--routepick #route-banner { display:block; }
    .app--game .game__chips { position:fixed; top:8px; left:50%; transform:translateX(-50%);
      z-index:45; max-width:calc(100vw - 24px); background:color-mix(in srgb, var(--bg2) 85%, transparent);
      border:2px solid var(--line); box-shadow:var(--bevel); padding:6px 9px; }
    /* Slim rest state: hide name + deed-count; keep face/money/TURN-OUT-JAIL badges/
       active glow glanceable at rest (owner requirement — state must stay visible
       without hovering). Pure CSS hover-expand: no JS, chipHtml's markup/class list
       stay byte-identical, so the click-popover behavior is untouched for E2E. */
    .app--game .pcard--chip .pcard__name, .app--game .pcard--chip .chip__deeds { display:none; }
    .app--game .pcard--chip:hover .pcard__name, .app--game .pcard--chip:hover .chip__deeds { display:inline; }
    .app--game .game__actionbar { position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
      z-index:45; max-width:calc(100vw - 24px); max-height:44vh;
      background:color-mix(in srgb, var(--bg2) 85%, transparent);
      border:2px solid var(--line); box-shadow:var(--bevel); padding:8px 10px; }
    /* dice/tabs z only beat the z:45 chrome because .game__center is NOT a stacking
       context under .app--game — see the container-type:normal rule + comment above. */
    .app--game #dice-overlay { z-index:50; } /* above the floating chrome (45) — tumble never clipped */
    .app--game #drawer-tabs { z-index:46; } /* above the chrome bars if they ever meet the right edge */
    .app--game .drawer { z-index:55; } /* above the floating chrome (45) when open */

    /* ============ WIDE-SCREEN GUTTER MODE (owner acceptance fix wave, Fix 3) ============
       Owner's choice for the horizontal voids beside the height-driven square board on
       wide monitors: fill them with UI instead of leaving them blank. App.js
       _syncGutterMode() measures the real per-side gutter ((viewport width - board
       width) / 2) every render + on resize, toggles `.game--gutters` on #game-area at
       the >=300px-per-side threshold, and writes the REAL width into --gutter-w so
       both panels below are provably sized from the actual void (the zero-overlap
       invariant holds in both modes, same guarantee style as --chrome-top/
       --chrome-bottom above). Below the threshold this whole block is inert — today's
       floating slim chips + overlay drawer render exactly as before.
       LEFT gutter: the chip strip becomes a vertical column (position/flex-direction
       flip only — chipHtml's markup is untouched) with full info visible (no hover
       needed): the ID-selector specificity here (#game-area.game--gutters) beats the
       plain-class hover-reveal rule above without needing !important.
       RIGHT gutter: the SAME #drawer element (mechanism untouched — _openDrawer/
       _closeDrawer, Escape-to-close, tab switching all keep working byte-for-byte)
       just gets repositioned/resized into the gutter instead of overlaying the board,
       and _syncGutterMode auto-opens it (LOG tab) once per mode-ENTRY. */
    .app--game #game-area.game--gutters .game__chips {
      flex-direction:column; align-items:stretch;
      top:8px; bottom:8px; left:8px; right:auto; transform:none;
      width:calc(var(--gutter-w, 300px) - 16px); max-width:calc(var(--gutter-w, 300px) - 16px);
      overflow-y:auto; overflow-x:hidden;
    }
    .app--game #game-area.game--gutters .pcard--chip .pcard__name,
    .app--game #game-area.game--gutters .pcard--chip .chip__deeds { display:inline; }
    .app--game #game-area.game--gutters .drawer {
      position:fixed; top:8px; bottom:8px; right:8px; left:auto;
      width:calc(var(--gutter-w, 300px) - 16px);
    }

    /* chip popover (openUiModal(chipDetailHtml(d))) — full tall-card body */
    .chip-detail { padding:16px; display:flex; flex-direction:column; gap:9px; }
    .chip-detail__head { display:flex; gap:10px; align-items:center; }
    .chip-detail__id { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
    .chip-detail__face { width:56px; height:56px; image-rendering:pixelated; object-fit:cover;
      border:3px solid var(--pc); box-shadow:var(--bevel), 3px 3px 0 rgba(0,0,0,.5); flex:none; }
    .chip-detail__face--letter { display:flex; align-items:center; justify-content:center;
      font-family:var(--disp); font-size:20px; background:var(--bg3); color:var(--tcol,var(--ink)); }
    /* Task 3 (spec §2.5b): first-paragraph lore excerpt, shared by the chip AND
       token popovers (same builder/cache — chip-detail__lore lives inside chipDetailHtml
       regardless of which click opened it). Raw pass-through in the builder (App esc()'d
       upstream — see chipDetailHtml's doc comment), styled as flowing body copy, not
       pixel-display type, to stay readable at paragraph length. */
    .chip-detail__lore { font-family:var(--body); font-size:13px; line-height:1.5; color:var(--ink-dim); }
    .chip-detail__lore p { margin:0; }
    .chip-detail__lore strong { color:var(--ink); }

    /* Tile popover (openUiModal(tileDetailHtml(d))) — spec §2.5/§2.5b. Same GB-pixel
       class family as .chip-detail above; .tile-detail__description/__flavor use --body
       (flowing prose) while labels/stats stay --disp (pixel display type), mirroring the
       chip popover's lore-vs-labels split. */
    .tile-detail { padding:16px; display:flex; flex-direction:column; gap:9px; max-width:420px; }
    .tile-detail__head { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
    .tile-detail__name { font-family:var(--disp); font-size:13px; color:var(--ink); }
    .tile-detail__type { font-family:var(--disp); font-size:7px; color:var(--ink-dim); letter-spacing:1px; white-space:nowrap; }
    .tile-detail__price { font-family:var(--disp); font-size:18px; color:var(--good); }
    .tile-detail__owner { display:flex; align-items:center; gap:8px; }
    .tile-detail__owner--unowned { font-family:var(--disp); font-size:8px; letter-spacing:1px; color:var(--ink-dim); }
    .tile-detail__owner-face { width:32px; height:32px; border:2px solid var(--line); image-rendering:pixelated; object-fit:cover; flex:none; }
    .tile-detail__owner-name { font-family:var(--disp); font-size:9px; }
    .tile-detail__level { display:flex; gap:3px; }
    .tile-detail__pip { width:10px; height:10px; background:var(--accent); border:1px solid #000; }
    .tile-detail__mortgaged { font-family:var(--disp); font-size:7px; color:var(--bad); letter-spacing:1px; }
    .tile-detail__rent { font-family:var(--disp); font-size:9px; color:var(--accent2); letter-spacing:.5px; }
    .tile-detail__stats { display:flex; gap:12px; font-family:var(--disp); font-size:7px; color:var(--ink-dim); letter-spacing:.5px; }
    .tile-detail__archetypes { display:flex; flex-wrap:wrap; gap:4px; }
    .tile-detail__archetype { font-family:var(--disp); font-size:6px; letter-spacing:.5px; color:var(--accent2);
      background:var(--bg3); border:1px solid var(--line); padding:3px 5px; }
    .tile-detail__description { font-family:var(--body); font-size:13px; line-height:1.5; color:var(--ink); }
    .tile-detail__flavor { font-family:var(--body); font-size:13px; line-height:1.5; color:var(--ink-dim); font-style:italic; }
    .tile-detail__group { display:flex; flex-wrap:wrap; gap:3px; }

    .board__grid-wrap { display:contents; }
    .board__grid { display:grid; width:100%; height:100%; position:relative;
      background:#0c1f12; border:4px solid #07140a;
      box-shadow:var(--bevel), 6px 6px 0 rgba(0,0,0,.5); padding:3px; gap:2px; }
    .board__grid--absolute { display:block; }
    .board__edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .board__edges line {
      /* Owner acceptance fix wave, Fix 2 ("线条非常凌乱" — rank-fit spread the
         positions; geographic-adjacency edges now cross the whole board): the
         base network is CONTEXT, not content — faint + thin at rest.
         vector-effect keeps the stroke a constant ~1 SCREEN px regardless of
         how big the board actually renders (the SVG viewBox is a fixed
         0-100 unit square scaled up to the board's real size — without this,
         the same stroke-width gets visibly THICKER as the board grows, e.g.
         a fullscreen 900px+ board vs a small window). */
      stroke: var(--ink-dim);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      opacity: 0.18;
      stroke-linecap: round;
      transition: opacity .15s ease, stroke .15s ease, stroke-width .15s ease;
    }
    /* Route-pick modality: dim the base network to near-invisible and let ONLY
       the pending fork's branch edges (`edge--hot`, toggled by
       _resolveAtlasRoute per the `data-from`/`data-to` identity set at SVG
       build time — see _renderAbsoluteBoard) pop bright. This is the
       PER-EDGE-HOT mechanism (chosen over the "dim everything, rely on the
       tile pulses alone" fallback the brief allowed) — per-edge
       identification turned out cheap, not invasive: routeChoices() already
       returns full node-list routes, and consecutive pairs in a path ARE the
       edges. See task report for the write-up. */
    .app--game #game-area.game--routepick .board__edges line { opacity:0.06; }
    .app--game #game-area.game--routepick .board__edges line.edge--hot {
      opacity:1; stroke:var(--good); stroke-width:2.2;
    }
    /* atlas: city label above each place's tile cluster */
    .place-label { position:absolute; transform:translateX(-50%); z-index:2; pointer-events:none;
      font-family:var(--disp); font-size:7px; letter-spacing:1px; color:var(--ink);
      text-shadow:1px 1px 0 #000; white-space:nowrap; }
    /* atlas: ring around capital-hub tiles so they stand out from plain arrows */
    .tile--hub { outline:2px solid var(--accent); outline-offset:1px; }
    /* atlas route-picker: pulse the reachable destination cities at a fork.
       Owner acceptance fix wave, Fix 1 ("卡住了" — the pending pick wasn't
       visible enough to notice): solid (not dashed) 3px outline + a
       box-shadow BREATHE, not a transform/scale pulse — tokens already
       animate `transform` via token-bob (index.html below), and a CSS
       animation REPLACES rather than merges an element's transform, so a
       transform-based pulse here would fight any token sharing the tile.
       z-index raised so the glow isn't clipped by an adjacent tile's box in
       the grid/absolute layouts. */
    .tile--route-target { outline:3px solid var(--good); outline-offset:2px; cursor:pointer;
      z-index:3; animation: routePulse 0.9s ease-in-out infinite; }
    @keyframes routePulse {
      0%,100% { box-shadow:0 0 0 0 color-mix(in srgb, var(--good) 70%, transparent); }
      50% { box-shadow:0 0 18px 7px color-mix(in srgb, var(--good) 70%, transparent); }
    }
    /* persistent token overlay — survives grid rebuilds, repositioned each tick */
    #token-layer { position:absolute; inset:0; pointer-events:none; z-index:5; }
    /* layout-rebuild Task 3: portrait tokens. Centering STAYS transform:translate(-50%,-50%)
       (not margin-based) — preserved exactly from the pre-task rule. Sized/scoped to
       #token-layer only so the shared .token/.token--sm classes used elsewhere (turnbox/
       auction/trade sideheads via App.js tokenHtml()) are untouched. background-color is a
       neutral fallback fill behind background-image (portrait) or the letter glyph
       (no portrait); color:var(--tcol) (not the old near-black #0a0a12) so the fallback
       letter stays legible against that dark neutral fill. */
    #token-layer .token { position:absolute; transform:translate(-50%,-50%);
      width:32px; height:32px; border:2px solid var(--tcol); background-size:cover;
      background-position:center; image-rendering:pixelated; background-color:var(--bg2);
      color:var(--tcol); font-size:12px;
      /* Task 3 (spec §2.5b): tokens are clickable (player-detail popover), but the
         #token-layer CONTAINER stays pointer-events:none (it must not steal clicks
         meant for the tile grid underneath) — only the token itself opts back in. */
      pointer-events:auto; cursor:pointer; }
    #token-layer .token--face { font-size:0; }
    #token-layer .token--turn { box-shadow:0 0 0 2px var(--tcol), 0 0 10px var(--tcol);
      animation: token-bob 0.9s ease-in-out infinite; }
    /* Fullscreen-stage review fix (mirrors the SAME bug class the globe renderer hit —
       task-3-report.md Concern #3 — but NOT the same fix): #token-layer sits at z:5
       above the tile grid and `#token-layer .token` opted back into pointer-events
       above, so a token (own or an opponent's) that visually overlaps a pending
       `.tile--route-target` wins the hit-test and the board's delegated click
       handler's token branch (checked FIRST, App.js createLayout) opens the player
       popover instead of ever reaching the `_routeTargets` commit branch below it.
       Route-commit must have absolute priority over the popover. Chosen fix: extend
       the EXISTING route-pick modality (`.game--routepick`, App.js _syncRoutePickChrome
       — already makes the chip strip/action bar click-transparent for the same "the
       only meaningful input right now is picking a route" reason, see that rule
       above) to tokens too, rather than reordering the JS with a new elementsFromPoint
       geometry lookup: with tokens pointer-events:none, the browser's native hit-test
       falls straight through to the `.tile[data-space]` underneath, so the ALREADY-
       CORRECT tile/_routeTargets branch runs unchanged — target hits commit the
       route, misses no-op, identical to a click that never had a token in the way.
       Final fix wave, Fix 3: the flat-board token selector above already covers
       `#token-layer .token`, but the globe renderer's `.gtoken` (same opt-back-in
       pointer-events:auto pattern, see that rule below) was missed — a mid-fork
       click on a `.gtoken` that isn't sitting on the fork's own route-target city
       fell through to the player-detail popover instead of no-op'ing like every
       other non-target click during a pending pick (Escape recovers; the commit
       itself was never at risk since `.gcity--route` already wins ties via
       z-index:2 regardless of DOM order — this is a parity/consistency fix, not
       a route-commit-safety fix). Adding `.gtoken` here matches it to the flat
       board's behavior: pointer-events:none for the duration of the pick, click
       falls through to whatever's underneath (nothing interactive on the globe
       overlay itself), so it's a no-op exactly like everywhere else. */
    .app--game #game-area.game--routepick #token-layer .token,
    .app--game #game-area.game--routepick .gtoken { pointer-events:none; }
    /* Combine the bob offset WITH the base translate(-50%,-50%) at every keyframe —
       an animation replaces (not merges with) the element's transform value, so a bare
       `transform:translateY(-2px)` at 50% would blow away the centering for that instant.
       Only touches `transform`; .token--hop's transition targets left/top, so a token
       that is both mid-hop and the current turn animates both without conflict. */
    @keyframes token-bob { 0%,100% { transform:translate(-50%,-50%); }
      50% { transform:translate(-50%,-50%) translateY(-2px); } }
    .tile { position:relative; background:var(--bg2); border:1.5px solid #060a14; overflow:hidden; display:flex; }
    .tile--corner { background:var(--bg3); }
    .tile--abs { position:absolute; transform:translate(-50%,-50%); z-index:1; }
    .tile--click { cursor:pointer; }
    .tile--click:hover { filter:brightness(1.3); }
    .tile--mortgaged { opacity:.55; }
    .tile__bar { position:absolute; background:#888; }
    .tile__bar--bottom { top:0; left:0; right:0; height:18%; }
    .tile__bar--top { bottom:0; left:0; right:0; height:18%; }
    .tile__bar--left { top:0; bottom:0; right:0; width:18%; }
    .tile__bar--right { top:0; bottom:0; left:0; width:18%; }
    .tile__inner { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:2px; gap:1px; min-width:0; }
    .tile--bottom .tile__inner { padding-top:18%; }
    .tile--top .tile__inner { padding-bottom:18%; }
    .tile--left .tile__inner { padding-right:18%; }
    .tile--right .tile__inner { padding-left:18%; }
    .tile__name { font-family:var(--body); font-size:11px; line-height:.92; color:var(--ink); overflow-wrap:anywhere; letter-spacing:-.3px; }
    .tile__price { font-family:var(--disp); font-size:6px; color:var(--ink-dim); }
    .tile__inner .glyph { font-size:13px; color:var(--accent); }
    .tile--corner .tile__name { font-size:13px; color:var(--accent); }
    .tile--corner .tile__inner .glyph { font-size:18px; }
    .tile__owner { position:absolute; top:2px; right:2px; display:flex; gap:1px; }
    .tile__house { width:6px; height:6px; background:var(--ocol); border:1px solid #000; }
    /* Ownership: colored border + a top-left portrait "flag" (Task 2). The mort badge
       moves to bottom-right — the flag now owns top-left, and would otherwise sit right
       on top of it (both were top:2px;left:2px). */
    .tile--owned { border-color:var(--ocol); border-width:2.5px; }
    .tile__flag {
      position:absolute; top:1px; left:1px; width:14px; height:14px;
      image-rendering:pixelated; border:1px solid var(--ocol);
      border-bottom-width:2px; z-index:2; object-fit:cover;
    }
    .tile__flag--letter { display:flex; align-items:center; justify-content:center;
      font-family:var(--disp); font-size:8px; background:var(--ocol); color:var(--bg); }
    .tile--mortgaged .tile__flag { opacity:.45; }
    .tile__mort { position:absolute; bottom:2px; right:2px; font-family:var(--disp); font-size:6px; color:#fff; background:var(--bad); padding:0 2px; }
    .tile__pot { position:absolute; bottom:2px; left:2px; font-family:var(--disp); font-size:6px; color:var(--good); }
    /* atlas real-city backgrounds: world map behind the board + a photo behind each city tile */
    .board__grid--world { background-size:cover; background-position:center; background-repeat:no-repeat; }
    .tile__photo, .tile__scrim { position:absolute; inset:0; z-index:0; pointer-events:none; }
    .tile__photo { background-size:cover; background-position:center; }
    .tile__scrim { background:linear-gradient(to top, rgba(5,8,18,.86) 0%, rgba(5,8,18,.42) 70%, rgba(5,8,18,.30) 100%); }
    .tile--photo .tile__inner { position:relative; z-index:2; }
    .tile--photo .tile__bar, .tile--photo .tile__owner, .tile--photo .tile__mort { z-index:2; }
    .tile--photo .tile__name { color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.95); }
    .tile--photo .tile__price { color:#eef2ff; text-shadow:0 1px 2px rgba(0,0,0,.95); }
    .tile--photo .tile__inner .glyph { color:#fff; }
    /* atlas pixel-globe board (renderMode:'globe') */
    .board--globe { background:var(--bg); display:block; overflow:hidden; }
    .globe-host { width:100%; height:100%; }
    .board--globe #token-layer { display:none; } /* token projection is Stage 3 */
    .globe-fallback { color:var(--bad); padding:20px; font-family:var(--body); font-size:14px; }
    /* globe HTML overlays (Stage 3): crisp pixel labels, tokens, route picker, positioned per-frame */
    .globe-overlay { position:absolute; inset:0; pointer-events:none; z-index:4; overflow:hidden; }
    .gcity { position:absolute; top:0; left:0; font-family:var(--disp); font-size:7px; line-height:1;
      color:#fff; text-shadow:0 0 3px #000, 0 1px 2px #000; white-space:nowrap; letter-spacing:-.5px; pointer-events:none; }
    .gcity--route { color:var(--good); pointer-events:auto; cursor:pointer; padding:3px 5px;
      /* Owner acceptance fix wave, Fix 1: same stronger-pulse treatment as the flat
         board's .tile--route-target above — solid (not dashed) 3px outline, shared
         box-shadow-breathe routePulse keyframe (ease-in-out, not the old linear). */
      background:rgba(8,12,28,.7); outline:3px solid var(--good); animation:routePulse 1s ease-in-out infinite;
      /* Task 3: route-commit ABSOLUTELY outranks the token popover (spec: "keeps ABSOLUTE
         priority... before any popover logic"). A player's gtoken can visually sit on/near
         their OWN current city while it is simultaneously a route-pick fork (e.g. Terra
         Titans: the active player's token IS at the fork city) — .gtoken is later in DOM
         order (tokens render after city labels in _updateGlobeOverlay) so without an
         explicit z-index it would win the browser's hit-test and silently eat the route
         click (caught live: Playwright's actionability check refused to click, reporting
         ".gtoken intercepts pointer events" — a real user would have the same click swallowed).
         z-index wins regardless of DOM order. */
      z-index:2; }
    /* layout-rebuild Task 3: portrait face at 28px, mirroring #token-layer .token's
       treatment. Positioning mechanism UNCHANGED — _globeTick() (App.js) writes
       style.transform = 'translate(-50%,-50%) translate(x,y)' every frame from
       dataset.lat/lng/offx, so centering lives in that JS string, not in a static
       CSS rule here; border stays circular (border-radius:50%), just player-colored
       (var(--tcol)) instead of static white, matching the flat-board token's identity cue. */
    .gtoken { position:absolute; top:0; left:0; width:28px; height:28px; border-radius:50%;
      border:2px solid var(--tcol); background-size:cover; background-position:center;
      image-rendering:pixelated; background-color:var(--bg2); color:var(--tcol);
      font-family:var(--disp); font-size:11px;
      display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,.6);
      /* Task 3 (spec §2.5b): clickable, same opt-back-in as .gcity--route above —
         the .globe-overlay container stays pointer-events:none. */
      pointer-events:auto; cursor:pointer; }
    .gtoken--face { font-size:0; }

    .board__center { display:flex; flex-direction:column; align-items:center; justify-content:space-between;
      padding:14px; gap:8px; background:repeating-linear-gradient(135deg, #0c1f12 0 8px, #0e2415 8px 16px); }
    .board__center--abs { position:absolute; left:18%; top:18%; right:18%; bottom:18%; z-index:3; }
    /* atlas: small logo badge top-center (center freed; HUD lives in side panel) */
    .board__logo--badge { position:absolute; left:50%; top:6%; transform:translateX(-50%);
      z-index:3; pointer-events:none; text-align:center; opacity:0.92; }
    .board__logo--badge .board__logo-main { font-size:16px; }
    /* atlas: dice + buy/pass prompt relocated into the turnbox side panel */
    .turnbox__slot { margin:6px 0; padding:8px; border:1px solid var(--line);
      background:rgba(0,0,0,.25); display:flex; flex-direction:column; align-items:center; gap:6px; }
    .board__logo { display:flex; flex-direction:column; align-items:center; gap:6px; transform:rotate(-3deg); }
    .board__logo-main { font-family:var(--disp); font-size:26px; color:var(--accent); text-shadow:3px 3px 0 #000; letter-spacing:2px; text-align:center; }
    .board__logo-sub { font-family:var(--disp); font-size:7px; color:var(--ink-dim); letter-spacing:2px; text-align:center; }
    .board__season { display:flex; flex-direction:column; align-items:center; gap:3px; background:var(--bg3);
      border:3px solid var(--line); box-shadow:var(--bevel); padding:7px 14px; }
    .board__season-label { font-family:var(--disp); font-size:7px; color:var(--ink-dim); letter-spacing:2px; }
    .board__season-val { font-family:var(--disp); font-size:14px; color:var(--accent2); }
    .board__season-turns { font-family:var(--body); font-size:14px; color:var(--ink-dim); }
    .board__season-fx { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }

    .board__centerslot { width:100%; display:flex; justify-content:center; }

    .centerslot { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; }
    .centerslot__dice { display:flex; gap:10px; }
    .centerslot__total { font-family:var(--disp); font-size:9px; color:var(--accent); }
    .centerslot__hint { font-family:var(--disp); font-size:8px; color:var(--ink-dim); letter-spacing:1px; text-align:center; }
    .centerslot__prompt { background:var(--bg2); border:3px solid var(--accent); box-shadow:var(--bevel), var(--drop);
      padding:11px 14px; display:flex; flex-direction:column; align-items:center; gap:7px; min-width:220px; max-width:90%; }
    .cp__name { font-family:var(--disp); font-size:11px; color:var(--accent); text-align:center; }
    .cp__price { font-family:var(--disp); font-size:9px; color:var(--ink); }
    .cp__info { font-family:var(--body); font-size:16px; color:var(--ink); text-align:center; }
    .cp__btns { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; }

    /* turn box + log — layout-rebuild Task 4: horizontal action bar. .turnbox
       keeps only the GB card visual language (bg/border/bevel); all layout
       (direction/gap/padding) lives in .turnbox--bar, always applied together
       by renderTurnbox (no plain-.turnbox vertical consumer remains — grepped
       before deleting the old column/gap/padding rule this replaced). */
    .turnbox { background:var(--bg2); border:3px solid var(--line); box-shadow:var(--bevel), var(--drop); }
    .turnbox--bar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center; padding:8px 14px; }
    .turnbox__who { display:flex; align-items:center; gap:8px; font-family:var(--disp); font-size:11px; }
    /* 24px who-chip portrait, mirroring chip__face/chip__face--letter's pattern
       (game-chrome.js chipHtml) at turnbox scale. */
    .turnbox__face { width:24px; height:24px; image-rendering:pixelated; object-fit:cover; border:2px solid var(--tcol,var(--line)); flex:none; }
    .turnbox__face--letter { display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-size:10px; background:var(--bg3); color:var(--tcol,var(--ink)); }
    .turnbox__btnrow { display:flex; gap:8px; }
    .turnbox__btnrow .pix-btn { flex:1; }
    .turnbox__waiting { font-family:var(--disp); font-size:9px; color:var(--accent); text-align:center; padding:8px; animation:blink 1.4s steps(1) infinite; line-height:1.5; }

    /* property management */
    .manage { display:flex; flex-direction:column; }
    .manage__row { display:flex; align-items:center; justify-content:space-between; gap:6px;
      padding:6px 0; border-bottom:2px dashed var(--line); }
    .manage__row:last-child { border-bottom:none; }
    .manage__name { font-family:var(--body); font-size:15px; color:var(--ink); flex:1; min-width:0;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-left:4px solid var(--line); padding-left:6px; }
    .manage__actions { display:flex; gap:4px; flex-shrink:0; }

    .logbox { background:var(--bg2); border:3px solid var(--line); box-shadow:var(--bevel), var(--drop);
      display:flex; flex-direction:column; max-height:42vh; }
    .logbox__title { font-family:var(--disp); font-size:9px; color:var(--accent); padding:9px 11px;
      border-bottom:3px solid var(--line); background:var(--bg3); letter-spacing:1px; }
    .logbox__list { overflow-y:auto; padding:9px 11px; display:flex; flex-direction:column-reverse; gap:6px; }
    .logline { font-family:var(--body); font-size:16px; line-height:1.05; color:var(--ink);
      border-left:3px solid var(--line); padding-left:8px; }
    .logline--good { border-color:var(--good); }
    .logline--bad { border-color:var(--bad); }
    .logline--neutral { border-color:var(--accent2); }

    .airesp__title { font-family:var(--disp); font-size:8px; color:var(--accent2); padding:7px 10px; border-bottom:3px solid var(--line); background:var(--bg3); letter-spacing:1px; }
    .airesp__list { padding:8px 10px; display:flex; flex-direction:column; gap:7px; max-height:30vh; overflow-y:auto; }

    /* chat */

    .chat__title { font-family:var(--disp); font-size:9px; color:var(--accent2); padding:8px 10px; border-bottom:3px solid var(--line); background:var(--bg3); letter-spacing:1px; }

    /* trade */

    .trade__empty { font-family:var(--body); font-size:16px; color:var(--ink-dim); padding:14px 0; text-align:center; }
    .trade__prop { display:flex; align-items:center; gap:7px; background:var(--bg2); border:2px solid var(--line); padding:6px 8px; text-align:left; }
    .trade__prop.on { border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
    .trade__propbar { width:8px; height:16px; flex:0 0 auto; }
    .trade__propname { font-family:var(--body); font-size:16px; flex:1; }
    .trade__propprice { font-family:var(--disp); font-size:7px; color:var(--ink-dim); }
    .trade__cash { display:flex; justify-content:space-between; align-items:center; font-family:var(--disp); font-size:8px; color:var(--ink-dim); }
    .trade__cashctl { display:flex; align-items:center; gap:8px; }
    .trade__cashctl button { width:26px; height:26px; background:var(--bg2); border:2px solid var(--line); font-family:var(--disp); font-size:11px; box-shadow:var(--bevel); }
    .trade__cashval { font-family:var(--disp); font-size:11px; color:var(--good); min-width:60px; text-align:center; }
    .trade__swap { display:grid; place-items:center; padding-top:30px; }
    .trade__swap .glyph { font-size:26px; color:var(--accent); }
    .trade__bal { display:flex; justify-content:center; gap:12px; align-items:center; font-family:var(--disp); font-size:9px; color:var(--ink-dim); }
    .trade__balval.pos { color:var(--good); }
    .trade__balval.neg { color:var(--bad); }
    .trade__balval.even { color:var(--accent2); }
    .trade__actions { display:flex; gap:10px; justify-content:flex-end; }

    /* auction */
    .auction { padding:18px; display:flex; flex-direction:column; gap:13px; }
    .auction__head { font-family:var(--disp); font-size:13px; color:var(--accent); text-align:center; letter-spacing:1px; }
    .auction__lot { background:var(--bg3); border:3px solid var(--line); box-shadow:var(--bevel); padding:12px; display:flex; flex-direction:column; align-items:center; gap:5px; position:relative; }
    .auction__bar { position:absolute; top:0; left:0; right:0; height:7px; }
    .auction__lotname { font-family:var(--disp); font-size:13px; color:var(--ink); margin-top:6px; text-align:center; }
    .auction__listed { font-family:var(--body); font-size:15px; color:var(--ink-dim); }
    .auction__bidbox { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .auction__bidlabel { font-family:var(--disp); font-size:8px; color:var(--ink-dim); }
    .auction__bidval { font-family:var(--disp); font-size:26px; color:var(--good); }
    .auction__leader { font-family:var(--disp); font-size:8px; color:var(--ink-dim); display:flex; align-items:center; gap:5px; }
    .auction__bidders { display:flex; flex-direction:column; gap:5px; }
    .auction__bidder { display:flex; align-items:center; gap:8px; background:var(--bg3); border:2px solid var(--line); padding:6px 9px; font-family:var(--disp); font-size:8px; }
    .auction__bidder.lead { border-color:var(--accent); }
    .auction__bidder.out { opacity:.4; }
    .auction__bstate { margin-left:auto; color:var(--accent2); }
    .auction__bidder.out .auction__bstate { color:var(--bad); }
    .auction__bidctl { display:flex; gap:8px; align-items:center; justify-content:center; }
    .auction__bidctl input { width:100px; text-align:center; }
    .auction__actions { display:flex; gap:10px; }
    .auction__actions .pix-btn { flex:1; }

    /* AI settings */
    .aiset { padding:18px; display:flex; flex-direction:column; gap:14px; }
    .aiset__head { font-family:var(--disp); font-size:13px; color:var(--accent); text-align:center; letter-spacing:1px; }
    .aiset__field { display:flex; flex-direction:column; gap:5px; }
    .aiset__label { font-family:var(--disp); font-size:8px; color:var(--ink-dim); }
    .aiset__hint { font-family:var(--body); font-size:14px; color:var(--ink-dim); }
    .aiset__status { font-family:var(--disp); font-size:8px; padding:5px 9px; border:2px solid var(--line); align-self:flex-start; }
    .aiset__status.on { color:var(--good); border-color:var(--good); }
    .aiset__status.off { color:var(--ink-dim); }
    .aiset__actions { display:flex; gap:10px; justify-content:flex-end; }

    /* save/load */
    .saves { padding:18px; display:flex; flex-direction:column; gap:10px; }
    .saves__head { font-family:var(--disp); font-size:13px; color:var(--accent); text-align:center; letter-spacing:1px; }
    .saves__row { display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:8px 0; border-bottom:2px dashed var(--line); }
    .saves__row:last-of-type { border-bottom:none; }
    .saves__name { font-family:var(--disp); font-size:8px; color:var(--ink); }
    .saves__meta { font-family:var(--body); font-size:14px; color:var(--ink-dim); margin-top:3px; }
    .saves__actions { display:flex; gap:5px; }
    .saves__empty { font-family:var(--body); font-size:17px; color:var(--ink-dim); text-align:center; padding:14px 0; }

    /* ============ RESULTS ============ */
    .screen--results { display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; min-height:100vh; }
    .results__crown .glyph { font-size:42px; color:var(--accent); }
    .results__victory { font-family:var(--disp); font-size:44px; color:var(--accent); letter-spacing:4px; text-shadow:5px 5px 0 #000; }
    .results__winner { font-family:var(--disp); font-size:18px; margin-top:6px; text-align:center; }
    .results__sub { font-family:var(--body); font-size:19px; color:var(--ink-dim); text-align:center; }
    .results__table { width:460px; max-width:100%; margin-top:8px; }
    .standrow { display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:2px dashed var(--line); }
    .standrow:last-child { border-bottom:none; }
    .standrow__rank { font-family:var(--disp); font-size:11px; color:var(--accent); width:18px; }
    .standrow__name { font-family:var(--disp); font-size:9px; flex:1; }
    .standrow__props { font-family:var(--disp); font-size:7px; color:var(--ink-dim); }
    .standrow__net { font-family:var(--disp); font-size:9px; }
    .standrow__net .money { font-size:13px; }

    /* ============ RESPONSIVE ============ */
    @media (max-width:1180px) {
      /* Task-2 fix-wave: the old fixed .board width:min(92vw,640px) collided with the
         base rule's height:min(100%,1100px) — with BOTH dimensions set explicitly,
         aspect-ratio:1/1 is ignored and the board renders non-square. The base rule's
         grid-native height + aspect-ratio sizing already handles narrow viewports
         (max-width:100% on .board prevents horizontal overflow), so this override is
         removed rather than patched. See task-2-report.md fix-wave section. */
      .select__grid { grid-template-columns:repeat(2,1fr); }
      .title__logo-line { font-size:44px; }
    }
    @media (max-width:680px) {
      .screen { padding:14px; }
      .select__grid { grid-template-columns:1fr; }
      .trade__cols { grid-template-columns:1fr; }
      .trade__swap { padding:0; transform:rotate(90deg); }
      .lore { grid-template-columns:1fr; }
      .title__logo-line { font-size:30px; }
    }
  </style>
</head>
<body data-theme="council">
  <div id="app"></div>
  <script src="./src/App.js"></script>
</body>
</html>
